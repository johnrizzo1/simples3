<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#3B82F6" rx="80"/>

  <!-- S3 Icon representation -->
  <g transform="translate(128, 128)">
    <!-- Top bucket -->
    <ellipse cx="128" cy="80" rx="100" ry="30" fill="#60A5FA" opacity="0.8"/>
    <rect x="28" y="80" width="200" height="40" fill="#60A5FA"/>
    <ellipse cx="128" cy="120" rx="100" ry="30" fill="#3B82F6"/>

    <!-- Middle bucket -->
    <ellipse cx="128" cy="160" rx="90" ry="25" fill="#60A5FA" opacity="0.8"/>
    <rect x="38" y="160" width="180" height="30" fill="#60A5FA"/>
    <ellipse cx="128" cy="190" rx="90" ry="25" fill="#3B82F6"/>

    <!-- Bottom bucket -->
    <ellipse cx="128" cy="220" rx="80" ry="20" fill="#60A5FA" opacity="0.8"/>
    <rect x="48" y="220" width="160" height="25" fill="#60A5FA"/>
    <ellipse cx="128" cy="245" rx="80" ry="20" fill="#2563EB"/>
  </g>

  <!-- Text S3 -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="80" font-weight="bold" text-anchor="middle" fill="white">S3</text>
</svg>
